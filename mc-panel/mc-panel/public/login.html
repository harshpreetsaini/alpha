<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC Panel — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:      #0a0c14;
    --surface: #111520;
    --border:  #1e2540;
    --accent:  #00e5ff;
    --accent2: #7c3aed;
    --text:    #e2e8f0;
    --muted:   #64748b;
    --error:   #ef4444;
    --success: #10b981;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.35;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0%   { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  .glows { position: fixed; inset: 0; pointer-events: none; overflow: hidden; }
  .glow  { position: absolute; border-radius: 50%; filter: blur(100px); opacity: 0.1; animation: gpulse 8s ease-in-out infinite alternate; }
  .glow-1 { width: 500px; height: 500px; background: var(--accent);  top: -150px; right: -150px; }
  .glow-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; left: -100px; animation-delay: -4s; }
  @keyframes gpulse { 0% { opacity: 0.07; } 100% { opacity: 0.16; } }

  /* Floating particles */
  .particles { position: fixed; inset: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 2px; height: 2px;
    background: var(--accent);
    border-radius: 50%;
    animation: floatUp linear infinite;
    opacity: 0;
  }
  @keyframes floatUp {
    0%   { transform: translateY(100vh) scale(0); opacity: 0; }
    10%  { opacity: 0.6; }
    90%  { opacity: 0.3; }
    100% { transform: translateY(-10vh) scale(1.5); opacity: 0; }
  }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 44px;
    width: 420px;
    max-width: 95vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.06);
    animation: slideUp 0.5s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(28px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .logo { text-align: center; margin-bottom: 36px; }
  .logo-icon {
    width: 72px; height: 72px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 20px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 32px;
    margin-bottom: 18px;
    box-shadow: 0 8px 40px rgba(0,229,255,0.3), 0 0 0 8px rgba(0,229,255,0.06);
    animation: logoFloat 4s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0)    rotate(-1deg); }
    50%       { transform: translateY(-8px) rotate(1deg); }
  }
  .logo h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 22px;
    font-weight: 900;
    letter-spacing: 0.14em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p { color: var(--muted); font-size: 11px; margin-top: 6px; letter-spacing: 0.08em; }

  .divider {
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--border), transparent);
    margin: 4px 0 28px;
  }

  .field { margin-bottom: 18px; }
  label {
    display: block;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  .input-wrap { position: relative; }
  .input-icon {
    position: absolute;
    left: 12px; top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 12px 14px 12px 36px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s, background 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.1);
    background: rgba(0,229,255,0.03);
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #fff;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.12em;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
    position: relative;
    overflow: hidden;
  }
  button:hover { opacity: 0.92; transform: translateY(-2px); box-shadow: 0 8px 32px rgba(0,229,255,0.2); }
  button:active { transform: translateY(0); }
  button.loading { pointer-events: none; opacity: 0.7; }

  .btn-inner { display: flex; align-items: center; justify-content: center; gap: 8px; }
  .spinner {
    width: 14px; height: 14px;
    border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    display: none;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .msg {
    margin-top: 14px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 12px;
    display: none;
    animation: fadeIn 0.2s ease;
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .msg.error   { display: block; background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: var(--error); }
  .msg.success { display: block; background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: var(--success); }

  .version-tag {
    text-align: center;
    color: var(--muted);
    font-size: 10px;
    margin-top: 24px;
    letter-spacing: 0.06em;
  }
  .version-tag span { color: var(--accent); }
</style>
</head>
<body>
<div class="glows">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
</div>
<div class="particles" id="particles"></div>

<div class="card">
  <div class="logo">
    <div class="logo-icon">⛏️</div>
    <h1>MC PANEL</h1>
    <p>BEDROCK SERVER DASHBOARD</p>
  </div>
  <div class="divider"></div>

  <div class="field">
    <label>Username</label>
    <div class="input-wrap">
      <span class="input-icon">👤</span>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username"/>
    </div>
  </div>
  <div class="field">
    <label>Password</label>
    <div class="input-wrap">
      <span class="input-icon">🔑</span>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password"/>
    </div>
  </div>

  <button id="btn" onclick="doLogin()">
    <span class="btn-inner">
      <span class="spinner" id="spinner"></span>
      <span id="btnText">LOGIN TO PANEL</span>
    </span>
  </button>
  <div class="msg" id="msg"></div>
  <div class="version-tag">MC PANEL <span>v2.0</span> · BEDROCK EDITION</div>
</div>

<script>
  // Floating particles
  const container = document.getElementById('particles');
  for (let i = 0; i < 25; i++) {
    const p = document.createElement('div');
    p.className = 'particle';
    p.style.left = Math.random() * 100 + 'vw';
    p.style.width = p.style.height = (1 + Math.random() * 2) + 'px';
    p.style.animationDuration = (6 + Math.random() * 14) + 's';
    p.style.animationDelay    = -(Math.random() * 20) + 's';
    container.appendChild(p);
  }

  async function doLogin() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('msg');
    const btn      = document.getElementById('btn');
    const spinner  = document.getElementById('spinner');
    const btnText  = document.getElementById('btnText');

    msg.className = 'msg';
    if (!username || !password) {
      msg.className   = 'msg error';
      msg.textContent = 'Both fields are required.';
      return;
    }

    btn.classList.add('loading');
    spinner.style.display = 'block';
    btnText.textContent   = 'AUTHENTICATING…';

    try {
      const res  = await fetch('/api/login', {
        method  : 'POST',
        headers : { 'Content-Type': 'application/json' },
        body    : JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (data.ok) {
        btnText.textContent = 'AUTHENTICATED ✓';
        msg.className   = 'msg success';
        msg.textContent = 'Login successful — loading dashboard…';
        setTimeout(() => window.location.href = '/index.html', 700);
      } else {
        msg.className   = 'msg error';
        msg.textContent = data.error || 'Invalid credentials.';
        btn.classList.remove('loading');
        spinner.style.display = 'none';
        btnText.textContent   = 'LOGIN TO PANEL';
        document.getElementById('password').value = '';
        document.getElementById('password').focus();
      }
    } catch {
      msg.className   = 'msg error';
      msg.textContent = 'Network error — is the server running?';
      btn.classList.remove('loading');
      spinner.style.display = 'none';
      btnText.textContent   = 'LOGIN TO PANEL';
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
</script>
</body>
</html>
