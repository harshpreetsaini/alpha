<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>MC Panel — First-Time Setup</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0a0c14;
    --surface:  #111520;
    --border:   #1e2540;
    --accent:   #00e5ff;
    --accent2:  #7c3aed;
    --text:     #e2e8f0;
    --muted:    #64748b;
    --success:  #10b981;
    --error:    #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(var(--border) 1px, transparent 1px),
      linear-gradient(90deg, var(--border) 1px, transparent 1px);
    background-size: 40px 40px;
    opacity: 0.4;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
  }
  @keyframes gridMove {
    0%   { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  .glows {
    position: fixed;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .glow {
    position: absolute;
    border-radius: 50%;
    filter: blur(100px);
    opacity: 0.12;
    animation: pulse 8s ease-in-out infinite alternate;
  }
  .glow-1 { width: 600px; height: 600px; background: var(--accent);  top: -200px; left: -200px; }
  .glow-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation-delay: -4s; }
  @keyframes pulse { 0% { opacity: 0.08; } 100% { opacity: 0.18; } }

  .card {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 48px 44px;
    width: 440px;
    max-width: 95vw;
    box-shadow: 0 24px 80px rgba(0,0,0,0.6), 0 0 0 1px rgba(0,229,255,0.05);
    animation: slideUp 0.6s cubic-bezier(0.16,1,0.3,1) both;
  }
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(32px) scale(0.96); }
    to   { opacity: 1; transform: translateY(0)    scale(1); }
  }

  .logo {
    text-align: center;
    margin-bottom: 32px;
  }
  .logo-icon {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 16px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
    margin-bottom: 16px;
    box-shadow: 0 8px 32px rgba(0,229,255,0.25);
    animation: logoFloat 3s ease-in-out infinite;
  }
  @keyframes logoFloat {
    0%, 100% { transform: translateY(0); }
    50%       { transform: translateY(-6px); }
  }
  .logo h1 {
    font-family: 'Orbitron', sans-serif;
    font-size: 20px;
    font-weight: 900;
    letter-spacing: 0.12em;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .logo p {
    color: var(--muted);
    font-size: 12px;
    margin-top: 6px;
    letter-spacing: 0.05em;
  }

  .field {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(0,229,255,0.12);
  }

  .hint {
    font-size: 11px;
    color: var(--muted);
    margin-top: 28px;
    padding: 12px 14px;
    background: rgba(124,58,237,0.08);
    border: 1px solid rgba(124,58,237,0.2);
    border-radius: 8px;
    line-height: 1.6;
  }

  button {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    border-radius: 8px;
    color: #0a0c14;
    font-family: 'Orbitron', sans-serif;
    font-size: 13px;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    margin-top: 24px;
    transition: opacity 0.2s, transform 0.15s;
    position: relative;
    overflow: hidden;
  }
  button:hover { opacity: 0.9; transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(rgba(255,255,255,0.15), transparent);
    pointer-events: none;
  }

  .msg {
    margin-top: 16px;
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 13px;
    display: none;
  }
  .msg.error   { display: block; background: rgba(239,68,68,0.1);  border: 1px solid rgba(239,68,68,0.3);  color: var(--error); }
  .msg.success { display: block; background: rgba(16,185,129,0.1); border: 1px solid rgba(16,185,129,0.3); color: var(--success); }

  .step-badge {
    display: inline-block;
    background: rgba(0,229,255,0.1);
    border: 1px solid rgba(0,229,255,0.25);
    color: var(--accent);
    border-radius: 20px;
    font-size: 11px;
    padding: 4px 12px;
    letter-spacing: 0.08em;
    margin-bottom: 6px;
  }
</style>
</head>
<body>
<div class="glows">
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>
</div>
<div class="card">
  <div class="logo">
    <div class="logo-icon">⛏️</div>
    <h1>MC PANEL</h1>
    <p>BEDROCK SERVER MANAGEMENT</p>
  </div>

  <span class="step-badge">STEP 1 OF 1 — INITIAL SETUP</span>
  <div style="height:12px"></div>

  <div class="field">
    <label>Admin Username</label>
    <input type="text" id="username" placeholder="e.g. admin" autocomplete="username"/>
  </div>
  <div class="field">
    <label>Admin Password</label>
    <input type="password" id="password" placeholder="Minimum 4 characters" autocomplete="new-password"/>
  </div>

  <div class="hint">
    🔒 This creates your admin account.<br/>
    After setup, you'll use these credentials every time you log in.<br/>
    There is no recovery — choose something memorable.
  </div>

  <button id="btn" onclick="doSetup()">COMPLETE SETUP</button>
  <div class="msg" id="msg"></div>
</div>

<script>
  async function doSetup() {
    const username = document.getElementById('username').value.trim();
    const password = document.getElementById('password').value;
    const msg      = document.getElementById('msg');
    const btn      = document.getElementById('btn');

    msg.className = 'msg';
    msg.textContent = '';

    if (!username || !password) {
      msg.className = 'msg error';
      msg.textContent = 'Both fields are required.';
      return;
    }
    if (password.length < 4) {
      msg.className = 'msg error';
      msg.textContent = 'Password must be at least 4 characters.';
      return;
    }

    btn.textContent = 'SAVING…';
    btn.disabled    = true;

    try {
      const res  = await fetch('/api/setup', {
        method  : 'POST',
        headers : { 'Content-Type': 'application/json' },
        body    : JSON.stringify({ username, password }),
      });
      const data = await res.json();

      if (data.ok) {
        msg.className   = 'msg success';
        msg.textContent = '✓ Setup complete! Redirecting to login…';
        setTimeout(() => window.location.href = '/login.html', 1200);
      } else {
        msg.className   = 'msg error';
        msg.textContent = data.error || 'Setup failed.';
        btn.textContent = 'COMPLETE SETUP';
        btn.disabled    = false;
      }
    } catch {
      msg.className   = 'msg error';
      msg.textContent = 'Network error — is the server running?';
      btn.textContent = 'COMPLETE SETUP';
      btn.disabled    = false;
    }
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') doSetup();
  });
</script>
</body>
</html>
